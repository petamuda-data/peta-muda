# Data refresh. Runs the pipeline (prices update daily ~12:00 UTC at source)
# and commits the regenerated site/data. Deployment is handled by Cloudflare
# Workers Builds, which auto-redeploys the static site/ on every push, so this
# workflow only needs to refresh the data and push.
#
# Triggers: nightly cron, manual dispatch, AND any push to main that changes
# the pipeline or the hand-curated data (data/manual) — so a merge that edits
# curated issues/stances goes live without a manual dispatch. The bot's own
# commit only touches site/data, which is NOT in the paths filter, so it can
# never re-trigger itself.
name: refresh-data

on:
  schedule:
    # every 4h during the campaign so approved intake items go live same-day;
    # the 13:30 UTC slot (21:30 MYT) still lands after PriceCatcher's refresh
    - cron: '30 1,5,9,13,17,21 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'data/manual/**'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write

# One refresh at a time — a cron run and a merge-triggered run racing each
# other would fight over the git push.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run pipeline
        run: node pipeline/run.mjs
        env:
          PIPELINE_NO_CACHE: '1'
          # intake queue (approved ground/news stories); pipeline falls back to
          # the committed snapshot when these are unset
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INTAKE_PASS: ${{ secrets.INTAKE_PASS }}
          # The deployed site is the MUDA-edition build (team/campaign use:
          # volunteer hub + AI briefings). Remove this env to publish the
          # neutral public edition instead.
          EDITION: muda
          # live JPS flood-warning feed (keyless data.gov.my OpenAPI); only
          # fetched in CI, snapshot-committed for reproducible offline builds
          ALERTS_FEED: '1'
      - name: Run Melaka pipeline
        # the next front — same corpus filtered to Melaka + curated issues,
        # written to site/data/melaka. Non-fatal so a Melaka-source hiccup
        # never blocks the Johor refresh.
        run: PIPELINE_STATE=Melaka node pipeline/run_melaka.mjs || echo "melaka build skipped"
        env:
          EDITION: muda
          ALERTS_FEED: '1'
      - name: Commit refreshed data
        run: |
          git config user.name 'peta-muda-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add site/data data/derived
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%F)"
          git pull --rebase origin main
          git push
