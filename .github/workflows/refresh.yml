# Data refresh. Runs the Melaka pipeline and commits the regenerated
# site/data/melaka. Deployment is handled by Cloudflare Workers Builds, which
# auto-redeploys the static site/ on every push, so this workflow only needs
# to refresh the data and push.
#
# Triggers: daily cron, manual dispatch, AND any push to main that changes
# the pipeline or the hand-curated data (data/manual) — so a merge that edits
# curated issues/stances goes live without a manual dispatch. The bot's own
# commit only touches site/data, which is NOT in the paths filter, so it can
# never re-trigger itself.
name: refresh-data

on:
  schedule:
    # daily rebuild (10:30 MYT, just after the 10:00 MYT curated Routine).
    # Curated pushes already trigger an immediate rebuild via the push
    # paths-filter below — this cron only catches silent upstream source drift.
    - cron: '30 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'data/manual/**'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write

# One refresh at a time — a cron run and a merge-triggered run racing each
# other would fight over the git push.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run Melaka pipeline
        # Melaka is the live campaign and the only state the app serves —
        # this step is FATAL: a Melaka build failure must fail the job loudly,
        # not pass silently. Writes site/data/melaka.
        run: PIPELINE_STATE=Melaka node pipeline/run_melaka.mjs
        env:
          # The deployed site is the MUDA-edition build (team/campaign use:
          # volunteer hub + talking-points export). Remove this env to publish
          # the neutral public edition instead.
          EDITION: muda
          # live JPS flood-warning feed (keyless data.gov.my OpenAPI); only
          # fetched in CI, snapshot-committed for reproducible offline builds
          ALERTS_FEED: '1'
      - name: Commit refreshed data
        run: |
          git config user.name 'peta-muda-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add site/data data/derived
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%F)"
          git pull --rebase origin main
          git push
