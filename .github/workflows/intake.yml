# News crawler sweep: finds Johor-relevant stories that hit a MUDA-stance
# theme and inserts them as DRAFTS into the private intake queue. Publishing
# requires an admin's approval in /ops.html — this workflow never publishes.
# Skips silently until the three intake secrets are configured.
name: intake-news

on:
  schedule:
    - cron: '0 1,5,9,13,17,21 * * *' # every 4h, 30 min before each refresh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: intake-news
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sweep news feeds
        if: ${{ vars.INTAKE_ENABLED != 'false' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INTAKE_PASS: ${{ secrets.INTAKE_PASS }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "intake secrets not configured — skipping"; exit 0; fi
          node pipeline/news.mjs
